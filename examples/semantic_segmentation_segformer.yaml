# Fine-tune Segformer on FoodSeg103.
task: semantic_segmentation
model:
  source: hub
  name: nvidia/segformer-b0-finetuned-ade-512-512
  num_labels: 104
data:
  source: hub
  name: EduardoPacheco/FoodSeg103
  image_column: image
  mask_column: label
  image_size: 512
training:
  backend: auto
  precision: bf16
  learning_rate: 6.0e-5
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_epochs: 5
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
output:
  output_dir: /lus/flare/projects/myproj/runs/segformer_food
  run_name: segformer_b0_food
