# Fine-tune ViT-base on CIFAR-10.
task: image_classification
model:
  source: hub
  name: google/vit-base-patch16-224
  num_labels: 10
data:
  source: hub
  name: uoft-cs/cifar10
  image_column: img
  label_column: label
  image_size: 224
  # CIFAR-10 doesn't have a "validation" split; reuse test for eval.
  eval_split: test
training:
  backend: auto
  precision: bf16
  learning_rate: 3.0e-5
  per_device_train_batch_size: 32
  max_epochs: 3
  eval_strategy: epoch
  save_strategy: epoch
output:
  output_dir: /lus/flare/projects/datascience/parton/hf_train_runs/vit_cifar10
  run_name: vit_base_cifar10
